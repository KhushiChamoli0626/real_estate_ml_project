<!DOCTYPE html>

<html>
<head>
    <title>Real Estate Price Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            margin: 0;
            padding: 0;
        }

```
    .container {
        background: white;
        width: 350px;
        margin: 80px auto;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
    }

    h1 {
        margin-bottom: 20px;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        background: #4facfe;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #007bff;
    }

    h2 {
        color: green;
        margin-top: 20px;
    }
</style>
```

</head>

<body>

<div class="container">
    <h1>🏠 Price Predictor</h1>

```
<form action="/predict" method="post">
    <input type="number" name="area" placeholder="Area (sq ft)" required>
    <input type="number" name="bedrooms" placeholder="Bedrooms" required>
    <input type="number" name="bathrooms" placeholder="Bathrooms" required>
    <input type="number" name="location" placeholder="Location (1-3)" required>

    <button type="submit">Predict Price</button>
</form>

<h2>{{ prediction_text }}</h2>
```

</div>

</body>
</html>
